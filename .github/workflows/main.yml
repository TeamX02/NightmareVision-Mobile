name: Android

on:
  workflow_dispatch:

jobs:
  Android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
             submodules: true

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.4

      - name: Install Haxelib
        run: |
          haxelib setup ~/haxelib
          haxelib git hxcpp https://github.com/HaxeFoundation/hxcpp
          haxelib install lime 8.1.1
          haxelib install openfl 9.2.2
          haxelib install flixel 5.2.2
          haxelib run lime setup flixel
          haxelib run lime setup
          haxelib install flixel-tools 1.5.1
          haxelib install flixel-ui 2.5.0
          haxelib install flixel-addons 2.10.0
          haxelib install tjson
          haxelib install hxjsonast
          haxelib install away3d
          haxelib install hxvlc 1.2.0
          haxelib install flxanimate 3.0.4
          haxelib git linc_luajit https://github.com/mcagabe19-stuff/linc_luajit-rewriten.git
          haxelib install hscript 2.5.0
          haxelib git hscript-ex https://github.com/ianharrigan/hscript-ex
          haxelib git extension-androidtools https://github.com/MaysLastPlays-Stuff/extension-androidtools.git
          haxelib install hxcpp-debug-server
          haxelib run lime rebuild hxcpp
          haxelib list
      - name: Set Haxelib Versions
        run: |
          haxelib set flixel-addons 2.10.0
          haxelib set flixel-tools 1.5.1
          haxelib set flixel-ui 2.5.0
          haxelib set flixel 5.2.2
          haxelib set lime 8.1.1
          haxelib set openfl 9.2.2
          haxelib set hscript 2.5.0
          haxelib set hxvlc 1.2.0
          haxelib set flxanimate 3.0.4

      - name: Configure Android
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_LATEST_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME_17_X64
          haxelib run lime config ANDROID_SETUP true 

      - name: Compile
        run: haxelib run lime build android -final

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: NightmareVision Android
          path: export/release/android/bin/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
